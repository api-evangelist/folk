aid: folk
name: Folk
description: >
  Folk is a collaborative CRM platform designed for agencies, investors, and
  sales teams who need to manage relationships at scale. It provides a REST API
  organized around predictable resource-oriented URLs, accepting and returning
  JSON-encoded payloads with standard HTTP response codes. The API enables
  developers to manage contacts (people and companies), pipelines and deals,
  notes, reminders, interactions, and custom fields programmatically. Webhooks
  are supported for real-time event notifications, and the platform integrates
  with 5,000+ tools including Gmail, Outlook, LinkedIn, WhatsApp, and Zapier.
  API access is available on the Premium and Enterprise plans.
