apis:
  - name: Folk API
    description: >
      The Folk REST API provides full CRUD access to workspace data including
      people, companies, deals, notes, reminders, interactions, groups, custom
      fields, users, and webhooks. Authentication uses API key Bearer tokens
      generated in workspace settings. Rate limits are set at 600 requests per
      minute per user, with standard rate-limit response headers provided.
