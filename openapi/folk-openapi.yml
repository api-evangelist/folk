    Reminder:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 255
        entity:
          type: object
          properties:
            id:
              type: string
              minLength: 40
              maxLength: 40
              description: The ID of the entity connected to the reminder.
              example: per_55175e81-9a52-4ac3-930e-82792c23499b
            entityType:
              type: string
              enum:
              - person
              - company
              - object
              description: The type of the entity connected to the reminder. Can be
                `person`, `company` or `object`.
              example: person
            fullName:
              type: string
              maxLength: 1000
              description: The full name of the entity connected to the reminder.
              example: John Doe
          required:
          - id
          - entityType
          - fullName
        recurrenceRule:
          type: string
          description: The recurrence rule of the reminder. The recurrence rule is
            a string that follows the iCalendar format specified in [RFC 5545](https://icalendar.org/iCalendar-RFC-5545/3-8-5-3-recurrence-rule.html).
          example: 'DTSTART;TZID=Europe/Paris:20250717T090000

            RRULE:FREQ=WEEKLY;INTERVAL=1'
        visibility:
          type: string
          enum:
          - public
          - private
          description: "The visibility of the reminder.\n\n- `public`: The reminder\
            \ is visible to all users in the workspace.\n- `private`: The reminder\
            \ is visible only to the current user.\n    "
        assignedUsers:
          type: array
          items:
            $ref: '#/components/schemas/User'
          description: A list of workspace users to be notified when the reminder
            is triggered. For private reminders, only the current user is notified.
          example:
          - id: usr_a45c30d8-19fc-4939-94c7-17dc5e46f476
            fullName: John Doe
            email: john.doe@example.com
        nextTriggerTime:
          type: string
          format: date-time
          description: The next trigger time of the reminder.
          example: '2025-07-17T09:00:00.000Z'
          nullable: true
        lastTriggerTime:
          type: string
          format: date-time
          description: The last trigger time of the reminder.
          example: '2025-05-17T09:00:00.000Z'
          nullable: true
        createdBy:
          allOf:
          - $ref: '#/components/schemas/User'
          - description: The user who created the reminder.
        createdAt:
          type: string
          minLength: 20
          maxLength: 40
          description: The date and time the reminder was created, in ISO format.
          example: '2021-01-01T00:00:00.000Z'
          nullable: true
      required:
      - id
      - name
      - entity
      - recurrenceRule
      - visibility
      - assignedUsers
      - nextTriggerTime
      - lastTriggerTime
      - createdBy
      - createdAt
      description: A reminder linked to an entity.
      example:
        id: rmd_91118b73-5a75-480b-b8e3-a33671c35cdc
        name: Reminder on John Doe
        entity:
          id: per_55175e81-9a52-4ac3-930e-82792c23499b
          entityType: person
          fullName: John Doe
        recurrenceRule: 'DTSTART;TZID=Europe/Paris:20250717T090000

          RRULE:FREQ=WEEKLY;INTERVAL=1'
        visibility: public
        assignedUsers:
        - id: usr_a45c30d8-19fc-4939-94c7-17dc5e46f476
          fullName: John Doe
          email: john.doe@example.com
        nextTriggerTime: '2025-07-17T09:00:00.000Z'
        lastTriggerTime: '2025-05-17T09:00:00.000Z'
        createdBy:
          id: usr_bc984b3f-0386-434d-82d7-a91eb6badd71
          fullName: John Doe
          email: john.doe@example.com
        createdAt: '2021-01-01T00:00:00.000Z'
    LoggedInteraction:
      type: object
      properties:
        id:
          type: string
        entity:
          type: object
          properties:
            id:
              type: string
              description: The ID of the entity connected to the interaction.
              example: per_55175e81-9a52-4ac3-930e-82792c23499b
            entityType:
              type: string
              enum:
              - person
              - company
              description: The type of the entity connected to the interaction. Can
                be `person` or `company`.
              example: person
            fullName:
              type: string
              description: The full name of the entity connected to the interaction.
              example: John Doe
          required:
          - id
          - entityType
          - fullName
        dateTime:
          type: string
          format: date-time
          description: The date and time of the interaction.
          example: '2025-07-17T09:00:00.000Z'
        title:
          type: string
          description: The title of the interaction.
          example: Coffee with John Doe
        content:
          type: string
          description: The multi-line content of the interaction.
          example: 'Had a coffee with John Doe

            Discussed the new project.'
        type:
          anyOf:
          - type: string
            maxLength: 50
            format: emoji
            description: An emoji representing the interaction type.
            example: ☕️
          - type: string
            enum:
            - call
            - meeting
            - message
            - coffee
            - lunch
            - event
            - drink
            description: A predefined interaction type.
            example: coffee
          - type: string
            enum:
            - whatsapp
            - twitter
            - linkedin
            - hangout
            - skype
            - slack
            - iMessage
            - fbMessenger
            - signal
            - discord
            - wechat
            - telegram
            - viber
            description: A messaging app used for the interaction.
            example: slack
          description: The type of the interaction. Can be a predefined type or an
            emoji.
          example: coffee
      required:
      - id
      - entity
      - dateTime
      - title
      - content
      - type
      description: An interaction linked to an entity.
      example:
        id: lit_b049db09-c03d-4f32-96d6-d314760add5d
        title: Coffee with John Doe
        content: 'Had a coffee with John Doe

          Discussed the new project.'
        entity:
          id: per_55175e81-9a52-4ac3-930e-82792c23499b
          entityType: person
          fullName: John Doe
        dateTime: '2025-07-17T09:00:00.000Z'
        type: coffee
    Webhook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 255
          description: A friendly name for the webhook.
          example: My app integration
        targetUrl:
          type: string
          maxLength: 2048
          format: uri
          description: The URL of the webhook.
          example: https://my-app.com/webhook
        subscribedEvents:
          type: array
          items:
            type: object
            properties:
              eventType:
                type: string
              filter:
                type: object
                properties:
                  groupId:
                    type: string
                    maxLength: 255
                  objectType:
                    type: string
                    maxLength: 255
                  path:
                    type: array
                    items:
                      type: string
                      maxLength: 255
                    maxItems: 3
                  value:
                    type: string
                    maxLength: 255
                default: {}
            required:
            - eventType
          maxItems: 20
          description: The events the webhook is subscribed to, with optional filters.
            For more information on how to use filters, see the [create webhook documentation](/api-reference/webhooks/create-a-webhook).
          example:
          - eventType: person.created
            filter: {}
        redactedSigningSecret:
          type: string
          maxLength: 255
          description: The signing secret of the webhook.
          example: whs_fx**********************oVMa
        status:
          type: string
          enum:
          - active
          - inactive
          description: The status of the webhook.
          example: active
        createdAt:
          type: string
          format: date-time
          description: The date and time the webhook was created.
          example: '2025-07-17T09:00:00.000Z'
      required:
      - id
      - name
      - targetUrl
      - subscribedEvents
      - redactedSigningSecret
      - status
      - createdAt
      description: A webhook listening to events from the workspace and sending them
        to a URL.
      example:
        id: wbk_8c18c158-d49e-4ad4-90d4-2b197688bac7
        name: My app integration
        targetUrl: https://my-app.com/webhook
        subscribedEvents:
        - eventType: person.created
          filter: {}
        redactedSigningSecret: whs_fx**********************oVMa
        status: active
        createdAt: '2025-07-17T09:00:00.000Z'
    WebhookWithSigningSecret:
      type: object
